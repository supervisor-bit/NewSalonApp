<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profi Kadeřnická Karta</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="karta">
        <div class="karta-header">
            <h1>Diagnostika Vlasů</h1>
            <span class="date">Aktuální záznam</span>
        </div>

        <form class="karta-body">
            <div class="sekce">
                <span class="sekce-nadpis">Informace o klientovi</span>
                <div class="input-group">
                    <input type="text" name="jmeno" placeholder="Jméno a příjmení klienta" required>
                    <input type="date" name="datum_visity">
                </div>
            </div>

            <div class="sekce">
                <span class="sekce-nadpis">Stav vlasů a pokožky</span>
                <div class="label-mini">Textura:</div>
                <div class="volba-pills">
                    <div class="pilla">
                        <input type="radio" id="textura_jemne" name="textura" value="jemné" checked>
                        <label for="textura_jemne">Jemné</label>
                    </div>
                    <div class="pilla">
                        <input type="radio" id="textura_stredni" name="textura" value="střední">
                        <label for="textura_stredni">Střední</label>
                    </div>
                    <div class="pilla">
                        <input type="radio" id="textura_silne" name="textura" value="silné">
                        <label for="textura_silne">Silné</label>
                    </div>
                </div>

                <div class="label-mini" style="margin-top: 15px;">Kondice:</div>
                <div class="volba-pills">
                    <div class="pilla"><input type="checkbox" id="c1" name="k[]" value="s"><label for="c1">Suché</label>
                    </div>
                    <div class="pilla"><input type="checkbox" id="c2" name="k[]" value="m"><label
                            for="c2">Mastné</label></div>
                    <div class="pilla"><input type="checkbox" id="c3" name="k[]" value="p"><label
                            for="c3">Poškozené</label></div>
                </div>
            </div>

            <div class="sekce">
                <span class="sekce-nadpis">Barevná receptura</span>
                <div id="receptura-container">
                    <div class="recept-row">
                        <select name="odstin[]">
                            <option value="" disabled selected>Odstín...</option>
                            <option value="1.0">1.0 Černá</option>
                            <option value="7.0">7.0 Střední blond</option>
                            <option value="10.1">10.1 Platinová</option>
                        </select>
                        <input type="number" name="gramy[]" placeholder="g">
                        <select name="oxidant[]">
                            <option value="">Vol.</option>
                            <option value="3">3%</option>
                            <option value="6">6%</option>
                        </select>
                        <button type="button" class="btn-remove" onclick="this.parentElement.remove()">×</button>
                    </div>
                </div>
                <button type="button" class="btn-add" onclick="pridatRadek()">+ Přidat odstín</button>
            </div>

            <button type="submit" class="btn-ulozit">ULOŽIT KARTU</button>
        </form>
    </div>

    <script>
        function pridatRadek() {
            const container = document.getElementById('receptura-container');
            const radek = container.querySelector('.recept-row').cloneNode(true);
            radek.querySelectorAll('input').forEach(i => i.value = '');
            container.appendChild(radek);
        }
    </script>
</body>

</html>
